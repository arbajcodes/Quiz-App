<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <div id="quiz-section">

            <div class="top-bar">
                <div id="score">Score : 0</div>
                <div id="progress">Question 1 / 10</div>
            </div>

            <div id="que">
                <span id="questionNo">1.</span>
                <span id="questionText">
                    Pink City kise kehte hain?
                </span>
            </div>

            <div id="options">
                <button class="option">Jodhpur</button>
                <button class="option">Udaipur</button>
                <button class="option">Sikar</button>
                <button class="option">Jaipur</button>
            </div>

            <div class="btns">
                <button id="prevBtn">Previous</button>
                <button id="nextBtn">Next</button>
            </div>

            <div id="result">
                Your Score : 0 / 10
            </div>

        </div>
    </div>
</body>

</html>
